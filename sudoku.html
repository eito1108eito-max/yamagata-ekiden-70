<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>数独ソルバー</title>
<style>
  :root {
    --bg:#f7f8fb; --fg:#1a1a1a; --line:#e1e5ec;
    --head:#1f4e78; --head-fg:#fff; --accent:#0563c1;
    --cell-bg:#fff; --fixed-bg:#e8edf5; --error:#c00;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--fg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    font-size:16px; min-height:100vh;
  }
  header {
    background:var(--head); color:var(--head-fg);
    padding:14px 16px; text-align:center;
  }
  header h1 { margin:0; font-size:18px; font-weight:600; }
  main { display:flex; flex-direction:column; align-items:center; padding:24px 16px 40px; gap:20px; }
  .grid {
    display:grid;
    grid-template-columns:repeat(9,1fr);
    border:3px solid var(--head);
    border-radius:6px;
    overflow:hidden;
    width:min(100%, 360px);
    aspect-ratio:1;
    background:var(--head);
    gap:1px;
  }
  .cell {
    background:var(--cell-bg);
    border:0;
    text-align:center;
    font-size:clamp(14px, 4vw, 20px);
    font-weight:600;
    width:100%; height:100%;
    color:var(--accent);
    caret-color:var(--accent);
    outline:none;
    padding:0;
    -moz-appearance:textfield;
    appearance:textfield;
  }
  .cell::-webkit-inner-spin-button,
  .cell::-webkit-outer-spin-button { display:none; }
  .cell.fixed { background:var(--fixed-bg); color:var(--fg); font-weight:700; }
  .cell.error { background:#ffe0e0; color:var(--error); }
  /* thick borders for 3x3 boxes */
  .cell:nth-child(3n+1):not(:nth-child(9n+1)) { border-left:2px solid var(--head); }
  .cell[data-row="3"],.cell[data-row="6"] { border-top:2px solid var(--head); }
  .buttons { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  button {
    appearance:none; border:0; cursor:pointer;
    font:inherit; font-weight:600; font-size:15px;
    padding:12px 24px; border-radius:999px; min-height:44px;
  }
  .btn-solve { background:var(--head); color:#fff; }
  .btn-clear { background:var(--line); color:var(--fg); }
  .btn-example { background:#e6f0ff; color:var(--accent); }
  .msg { font-size:14px; color:var(--error); min-height:20px; text-align:center; }
  .msg.ok { color:#1a7a1a; }
</style>
</head>
<body>
<header><h1>数独ソルバー</h1></header>
<main>
  <div class="grid" id="grid"></div>
  <div class="buttons">
    <button class="btn-example" onclick="loadExample()">例題</button>
    <button class="btn-solve" onclick="solve()">解く</button>
    <button class="btn-clear" onclick="clearGrid()">クリア</button>
  </div>
  <div class="msg" id="msg"></div>
</main>
<script>
const EXAMPLE = [
  [5,3,0, 0,7,0, 0,0,0],
  [6,0,0, 1,9,5, 0,0,0],
  [0,9,8, 0,0,0, 0,6,0],

  [8,0,0, 0,6,0, 0,0,3],
  [4,0,0, 8,0,3, 0,0,1],
  [7,0,0, 0,2,0, 0,0,6],

  [0,6,0, 0,0,0, 2,8,0],
  [0,0,0, 4,1,9, 0,0,5],
  [0,0,0, 0,8,0, 0,7,9],
];

const grid = document.getElementById('grid');
const inputs = [];

for (let r = 0; r < 9; r++) {
  for (let c = 0; c < 9; c++) {
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.min = 1; inp.max = 9;
    inp.className = 'cell';
    inp.dataset.row = r;
    inp.dataset.col = c;
    inp.addEventListener('input', () => {
      const v = inp.value.replace(/[^1-9]/g, '');
      inp.value = v ? v[v.length - 1] : '';
      inp.classList.remove('error');
      setMsg('');
    });
    inp.addEventListener('keydown', e => {
      const dirs = {ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
      if (dirs[e.key]) {
        e.preventDefault();
        const [dr,dc] = dirs[e.key];
        const nr = (+inp.dataset.row + dr + 9) % 9;
        const nc = (+inp.dataset.col + dc + 9) % 9;
        inputs[nr][nc].focus();
      }
    });
    grid.appendChild(inp);
    if (!inputs[r]) inputs[r] = [];
    inputs[r][c] = inp;
  }
}

function getBoard() {
  return inputs.map(row => row.map(inp => parseInt(inp.value) || 0));
}

function setBoard(board, fixedMask) {
  for (let r = 0; r < 9; r++)
    for (let c = 0; c < 9; c++) {
      inputs[r][c].value = board[r][c] || '';
      inputs[r][c].classList.toggle('fixed', !!(fixedMask && fixedMask[r][c]));
      inputs[r][c].classList.remove('error');
    }
}

function isValid(board, row, col, num) {
  for (let i = 0; i < 9; i++) {
    if (board[row][i] === num) return false;
    if (board[i][col] === num) return false;
    const br = 3 * Math.floor(row / 3) + Math.floor(i / 3);
    const bc = 3 * Math.floor(col / 3) + (i % 3);
    if (board[br][bc] === num) return false;
  }
  return true;
}

function backtrack(board) {
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      if (board[r][c] === 0) {
        for (let n = 1; n <= 9; n++) {
          if (isValid(board, r, c, n)) {
            board[r][c] = n;
            if (backtrack(board)) return true;
            board[r][c] = 0;
          }
        }
        return false;
      }
    }
  }
  return true;
}

function hasConflict(board) {
  for (let r = 0; r < 9; r++)
    for (let c = 0; c < 9; c++) {
      const v = board[r][c];
      if (!v) continue;
      board[r][c] = 0;
      if (!isValid(board, r, c, v)) { board[r][c] = v; return [r, c]; }
      board[r][c] = v;
    }
  return null;
}

function setMsg(txt, ok) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg' + (ok ? ' ok' : '');
}

function solve() {
  const board = getBoard();
  const conflict = hasConflict(board);
  if (conflict) {
    const [r, c] = conflict;
    inputs[r][c].classList.add('error');
    setMsg('矛盾があります。入力を確認してください。');
    return;
  }
  const fixed = inputs.map(row => row.map(inp => !!inp.value));
  const copy = board.map(r => [...r]);
  if (backtrack(copy)) {
    setBoard(copy, fixed);
    setMsg('解けました！', true);
  } else {
    setMsg('解が見つかりませんでした。');
  }
}

function clearGrid() {
  for (let r = 0; r < 9; r++)
    for (let c = 0; c < 9; c++) {
      inputs[r][c].value = '';
      inputs[r][c].className = 'cell';
    }
  setMsg('');
}

function loadExample() {
  const fixed = EXAMPLE.map(row => row.map(v => v !== 0));
  setBoard(EXAMPLE, fixed);
  setMsg('');
}
</script>
</body>
</html>
