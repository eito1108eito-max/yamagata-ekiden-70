<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>アラーム</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --border: #2a2a38;
    --accent: #6c63ff;
    --accent-dim: #3d3880;
    --text: #f0f0f8;
    --muted: #888;
    --red: #ff5f57;
    --green: #28c76f;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
    gap: 32px;
  }

  /* ── 現在時刻 ── */
  #clock {
    font-size: clamp(52px, 15vw, 88px);
    font-weight: 200;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
  }

  /* ── カード ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
  }

  .card h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── 入力エリア ── */
  .add-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  input[type="time"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 26px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    padding: 10px 14px;
    outline: none;
    color-scheme: dark;
    min-width: 0;
  }
  input[type="time"]:focus {
    border-color: var(--accent);
  }

  .btn-add {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .15s;
  }
  .btn-add:active { opacity: .7; }

  /* ── アラームリスト ── */
  #alarm-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 8px;
  }

  .alarm-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    transition: border-color .2s;
  }
  .alarm-item.active { border-color: var(--accent); }
  .alarm-item.ringing { border-color: var(--green); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(40,199,111,.3); }
    50%      { box-shadow: 0 0 0 8px rgba(40,199,111,0); }
  }

  .alarm-time {
    flex: 1;
    font-size: 28px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
  }

  .toggle {
    position: relative;
    width: 44px; height: 26px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border);
    border-radius: 99px;
    cursor: pointer;
    transition: background .2s;
  }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle-track::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #fff;
    transition: transform .2s;
  }
  .toggle input:checked + .toggle-track::after { transform: translateX(18px); }

  .btn-delete {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    transition: color .15s;
    flex-shrink: 0;
  }
  .btn-delete:hover { color: var(--red); }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 16px 0 4px;
  }

  /* ── 鳴動バナー ── */
  #banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--green);
    color: #fff;
    text-align: center;
    padding: 18px;
    font-size: 20px;
    font-weight: 600;
    transform: translateY(-100%);
    transition: transform .3s;
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
  }
  #banner.show { transform: translateY(0); }
  #banner button {
    background: rgba(0,0,0,.25);
    border: none;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 999px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="clock">00:00:00</div>

<div class="card">
  <h2>アラームを追加</h2>
  <div class="add-row">
    <input type="time" id="time-input">
    <button class="btn-add" onclick="addAlarm()" title="追加">＋</button>
  </div>
</div>

<div class="card">
  <h2>アラーム一覧</h2>
  <div id="alarm-list"><p class="empty">アラームがありません</p></div>
</div>

<div id="banner">
  <span id="banner-text">⏰ アラーム！</span>
  <button onclick="stopAlarm()">止める</button>
</div>

<script>
// ── state ──────────────────────────────────────────
let alarms = JSON.parse(localStorage.getItem('alarms') || '[]');
let ringingId = null;
let audioCtx = null;
let oscillators = [];

// ── clock ──────────────────────────────────────────
function tick() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;

  if (ss === '00') checkAlarms(hh, mm);
}
setInterval(tick, 1000);
tick();

// ── alarm check ────────────────────────────────────
function checkAlarms(hh, mm) {
  alarms.forEach(a => {
    if (a.enabled && a.time === `${hh}:${mm}` && ringingId !== a.id) {
      triggerAlarm(a);
    }
  });
}

function triggerAlarm(a) {
  ringingId = a.id;
  document.getElementById('banner-text').textContent = `⏰ ${a.time} のアラーム！`;
  document.getElementById('banner').classList.add('show');
  renderList();
  playBeep();
}

function stopAlarm() {
  ringingId = null;
  document.getElementById('banner').classList.remove('show');
  stopBeep();
  renderList();
}

// ── sound ──────────────────────────────────────────
function playBeep() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function beep() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
    oscillators.push(osc);
  }
  beep();
  const id = setInterval(() => { if (!audioCtx) { clearInterval(id); return; } beep(); }, 1200);
  audioCtx._intervalId = id;
}

function stopBeep() {
  if (audioCtx) {
    clearInterval(audioCtx._intervalId);
    oscillators.forEach(o => { try { o.stop(); } catch(_) {} });
    oscillators = [];
    audioCtx.close();
    audioCtx = null;
  }
}

// ── CRUD ───────────────────────────────────────────
function addAlarm() {
  const val = document.getElementById('time-input').value;
  if (!val) return;
  alarms.push({ id: Date.now(), time: val, enabled: true });
  alarms.sort((a, b) => a.time.localeCompare(b.time));
  save();
  renderList();
}

function deleteAlarm(id) {
  alarms = alarms.filter(a => a.id !== id);
  save();
  renderList();
}

function toggleAlarm(id) {
  const a = alarms.find(a => a.id === id);
  if (a) a.enabled = !a.enabled;
  save();
  renderList();
}

function save() {
  localStorage.setItem('alarms', JSON.stringify(alarms));
}

// ── render ─────────────────────────────────────────
function renderList() {
  const list = document.getElementById('alarm-list');
  if (!alarms.length) {
    list.innerHTML = '<p class="empty">アラームがありません</p>';
    return;
  }
  list.innerHTML = alarms.map(a => `
    <div class="alarm-item ${a.enabled ? 'active' : ''} ${ringingId === a.id ? 'ringing' : ''}">
      <span class="alarm-time">${a.time}</span>
      <label class="toggle">
        <input type="checkbox" ${a.enabled ? 'checked' : ''} onchange="toggleAlarm(${a.id})">
        <span class="toggle-track"></span>
      </label>
      <button class="btn-delete" onclick="deleteAlarm(${a.id})" title="削除">✕</button>
    </div>
  `).join('');
}

renderList();
</script>
</body>
</html>
